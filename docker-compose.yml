services:
  backend:
    build: ./talki-backend
    container_name: talki_backend
    ports:
      - "8000:8000"
    env_file:
      - ./talki-backend/.env # Đọc biến môi trường từ file .env của backend
    volumes:
      - ./talki-backend:/app # Mount code → hot-reload hoạt động
      - type: bind
        # VPS / prod: đặt file tại ./secrets/google-credentials.json. Dev Windows: set GOOGLE_CREDENTIALS_HOST_PATH trong .env hoặc copy key vào secrets/
        source: ${GOOGLE_CREDENTIALS_HOST_PATH:-./secrets/google-credentials.json}
        target: /keys/google-credentials.json
        read_only: true
    environment:
      - WATCHFILES_FORCE_POLLING=1
      - GOOGLE_APPLICATION_CREDENTIALS=/keys/google-credentials.json
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: talki_frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env # Đọc VITE_* env vars
    volumes:
      - ./frontend:/app # Mount code → hot-reload hoạt động
      - /app/node_modules # Giữ nguyên node_modules trong container (không bị host override)
    depends_on:
      - backend
    restart: unless-stopped
