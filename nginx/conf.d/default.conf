# Upstream tĩnh — ổn định hơn proxy_pass + biến (một số bản Nginx/Docker gây 502).
upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:5173;
    keepalive 16;
}
server {
    listen 80;
    server_name talki.id.vn www.talki.id.vn;

    # JWT / cookie header dài — tránh lỗi proxy buffer
    proxy_buffer_size 128k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 256k;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

# HTTPS: bật khi đã mount cert (xem comment cũ trong git history hoặc DEPLOYMENT_GUIDE)

