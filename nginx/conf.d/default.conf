# Upstream definitions
upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:5173;
}

# HTTP redirect to HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

# HTTP redirect to HTTPS
server {
    listen 80;
    server_name talki.id.vn www.talki.id.vn;
    # DNS nội bộ Docker — bắt buộc khi dùng biến trong proxy_pass (tránh 502 sau recreate container)
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream_frontend http://frontend:5173;
        proxy_pass $upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        set $upstream_backend http://backend:8000;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

